<!DOCTYPE html>
<html>
<head>
    <title>Yogyata</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .card {
            border-radius: 15px;
            padding: 20px;
        }

        .btn-custom {
            background-color: #ff7a18;
            border: none;
            color: white;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #ff4b2b;
            transform: scale(1.05);
        }

        .navbar {
            background: rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand" href="#">Yogyata</a>

    <div class="ms-auto">
        {% if user.is_authenticated %}
            <span class="me-3">👋 {{ user.username }}</span>
            <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-light btn-sm">Login</a>
            <a href="{% url 'signup' %}" class="btn btn-warning btn-sm">Signup</a>
        {% endif %}
    </div>
</nav>

<!-- MAIN CARD -->
<div class="container mt-5">
    <div class="card shadow-lg bg-white text-dark">

        <h2 class="text-center mb-4">🚀 Resume Skill Matcher</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Upload Resume</label>
                <input type="file" name="resume" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Job Description</label>
                <textarea name="job_desc" class="form-control" rows="5"></textarea>
            </div>

            <div class="text-center">
                <button class="btn btn-custom px-4 py-2">Analyze</button>
            </div>
        </form>

    </div>
</div>

</body>
</html>
